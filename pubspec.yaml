name: weather_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  # Environment & API
  env_flutter: ^0.1.4
  dio: ^5.7.0
  
  # Firebase
  firebase_core: ^3.5.0
  firebase_auth: ^5.3.0
  firebase_messaging: ^15.1.3
  cloud_firestore: ^5.3.1
  
  # State Management
  provider: ^6.1.0
  
  # Notifications
  flutter_local_notifications: ^18.0.1
  
  # Local Storage
  shared_preferences: ^2.2.3
  
  # Background Tasks
  workmanager: ^0.9.0+3
  
  # Utilities
  uuid: ^4.1.0
  package_info_plus: ^8.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
   - assets/
   - .env
